<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.png">
<title>Roadlog</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#f1f5f9;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb}
[data-theme="light"]{--bg:#f8fafc;--surface:#ffffff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--accent:#2563eb;--accent-hover:#1d4ed8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s,color .3s}
.container{max-width:600px;margin:0 auto;padding:1rem}
h1{font-size:1.5rem;margin-bottom:1rem}h2{font-size:1.2rem;margin-bottom:.75rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:.75rem;padding:1rem;margin-bottom:.75rem;cursor:pointer;transition:border-color .2s,background .3s}
.card:hover{border-color:var(--accent)}
.btn{display:inline-block;padding:.6rem 1.2rem;border-radius:.5rem;border:none;font-size:.9rem;font-weight:500;cursor:pointer;text-decoration:none;transition:background .2s;color:white}
.btn-primary{background:var(--accent)}.btn-primary:hover{background:var(--accent-hover)}
.btn-block{display:block;width:100%;text-align:center}
.btn-sm{padding:.4rem .8rem;font-size:.8rem}
.form-group{margin-bottom:1rem}.form-group label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:.25rem}
.form-group input,.form-group select{width:100%;padding:.6rem;border-radius:.5rem;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1rem;transition:background .3s,color .3s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
input[type="datetime-local"]::-webkit-calendar-picker-indicator{filter:invert(0.7);cursor:pointer;padding:.25rem}
input[type="datetime-local"]{cursor:pointer}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7);cursor:pointer;padding:.25rem}
input[type="date"]{cursor:pointer}
.prefill-hint{font-size:.75rem;color:var(--muted);margin-top:.2rem;font-style:italic}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:.75rem;padding:.75rem;text-align:center;transition:background .3s}
.stat-card .value{font-size:1.3rem;font-weight:700;color:var(--accent)}.stat-card .label{font-size:.75rem;color:var(--muted)}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.back{color:var(--muted);text-decoration:none;font-size:.9rem;cursor:pointer;background:none;border:none}.back:hover{color:var(--text)}
.empty{text-align:center;color:var(--muted);padding:2rem}
.error{color:#ef4444;font-size:.85rem;margin-bottom:.5rem}
.link{color:var(--accent);cursor:pointer;background:none;border:none;font-size:.85rem}
.nav{display:flex;gap:.5rem;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:.5rem}
.nav button{background:none;border:none;color:var(--muted);padding:.4rem .8rem;border-radius:.4rem;cursor:pointer;font-size:.85rem}
.nav button.active{background:var(--accent);color:white}
.toggle{position:relative;width:44px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;border:none;transition:background .3s}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:white;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:.75rem 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border:none}
.monthly-bar{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem}
.monthly-bar .bar{flex:1;height:24px;background:var(--border);border-radius:4px;overflow:hidden}
.monthly-bar .bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.monthly-bar .month-label{width:60px;font-size:.8rem;color:var(--muted)}
.monthly-bar .month-value{width:60px;font-size:.8rem;text-align:right}
.dropdown-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:10;max-height:180px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:.5rem;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.dropdown-item{display:flex;justify-content:space-between;align-items:center;padding:.6rem .75rem;cursor:pointer;transition:background .15s}
.dropdown-item:hover{background:var(--border)}
.dropdown-item+.dropdown-item{border-top:1px solid var(--border)}
.dropdown-item .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:.2rem .4rem;border-radius:.25rem}
.dropdown-item .del-btn:hover{color:#ef4444;background:rgba(239,68,68,.1)}
.dropdown-add{padding:.6rem .75rem;cursor:pointer;color:var(--accent);font-weight:500;border-top:1px solid var(--border);transition:background .15s}
.dropdown-add:hover{background:var(--border)}
.period-toggle{display:flex;gap:.25rem;margin-bottom:1rem;flex-wrap:wrap}
.period-toggle button{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.35rem .7rem;border-radius:.4rem;cursor:pointer;font-size:.8rem;transition:all .2s}
.period-toggle button.active{background:var(--accent);color:white;border-color:var(--accent)}
.chart-section{margin-bottom:1.5rem}
.chart-section h3{font-size:.9rem;color:var(--muted);margin-bottom:.5rem}
.chart-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem;font-size:.8rem}
.chart-row .chart-label{width:90px;color:var(--muted);text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.78rem}
.chart-row .chart-bar{flex:1;height:20px;background:var(--border);border-radius:3px;overflow:hidden}
.chart-row .chart-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.chart-row .chart-val{width:55px;text-align:right;flex-shrink:0}
.line-chart{position:relative;height:120px;border-left:1px solid var(--border);border-bottom:1px solid var(--border);margin:0 0 .5rem 40px;display:flex;align-items:flex-end}
.line-chart .dot{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--accent);transform:translate(-50%,-50%)}
.line-chart .line-bar{flex:1;background:var(--accent);border-radius:2px 2px 0 0;margin:0 1px;min-width:4px;transition:height .3s;opacity:.7}
.line-chart .line-bar:hover{opacity:1}
.chart-legend{display:flex;gap:.5rem;font-size:.75rem;color:var(--muted);margin-bottom:.25rem;flex-wrap:wrap}
.vehicle-filter{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.vehicle-filter button{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.3rem .6rem;border-radius:.4rem;cursor:pointer;font-size:.78rem}
.vehicle-filter button.active{background:var(--accent);color:white;border-color:var(--accent)}
.period-select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:.4rem;padding:.4rem .6rem;font-size:.85rem;cursor:pointer;appearance:auto}
.vbar-chart{display:flex;align-items:flex-end;gap:2px;height:140px;padding:0 .25rem;margin-bottom:.25rem;border-bottom:1px solid var(--border);overflow:hidden}
.vbar-chart .vbar{flex:1;min-width:20px;background:var(--accent);border-radius:3px 3px 0 0;transition:height .3s;position:relative;cursor:default;opacity:.8}
.vbar-chart .vbar:hover{opacity:1}
.vbar-chart .vbar:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:.3rem;padding:.2rem .4rem;font-size:.7rem;white-space:nowrap;color:var(--text);z-index:5}
.vbar-labels{display:flex;gap:4px;padding:0 .25rem}
.vbar-labels span{flex:1;min-width:20px;text-align:center;font-size:.65rem;color:var(--muted)}
.bar-tip{position:relative;cursor:default}
.bar-tip:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);border-radius:.3rem;padding:.25rem .5rem;font-size:.7rem;white-space:nowrap;z-index:10;pointer-events:none}
.fab-container{position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;display:flex;flex-direction:column-reverse;align-items:flex-end;gap:.5rem}
.fab{width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:transform .2s}
.fab-container.open .fab{transform:rotate(45deg)}
.fab-menu{display:none;flex-direction:column;gap:.5rem;margin-bottom:.5rem}
.fab-container.open .fab-menu{display:flex}
.fab-item{padding:.5rem 1rem;border-radius:2rem;border:none;color:#fff;font-size:.85rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);white-space:nowrap}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
let token=localStorage.getItem('roadlog_token');
let theme=localStorage.getItem('roadlog_theme')||'dark';
document.documentElement.setAttribute('data-theme',theme);

const currencies={EUR:'€',USD:'$',GBP:'£',CZK:'Kč',PLN:'zł',CHF:'CHF',SEK:'kr',NOK:'kr',DKK:'kr',HUF:'Ft'};
let curr='€';
let volUnit='L';
let distUnit='km';

let state={page:token?'dashboard':'login',vehicles:[],vehicleId:null,fillups:[],stats:null,prefill:null,dashboard:null,settings:null,users:[]};

async function api(p,o={}){
  const headers={'Content-Type':'application/json'};
  if(token)headers['Authorization']='Bearer '+token;
  const r=await fetch('/api'+p,{headers,...o});
  if(r.status===401&&token){token=null;localStorage.removeItem('roadlog_token');state.page='login';render();return null}
  if(r.status===204)return null;
  const data=await r.json();
  if(!r.ok)throw new Error(data.error||'Request failed');
  return data;
}

function toggleTheme(){
  theme=theme==='dark'?'light':'dark';
  localStorage.setItem('roadlog_theme',theme);
  document.documentElement.setAttribute('data-theme',theme);
  render();
}

function fuelUnit(fuelType,subType){
  const d=distUnit||'km';
  if(fuelType==='Electric'||subType==='electric')return{unit:'kWh',pricePlaceholder:'0.25',fullLabel:'Full charge',consumption:`kWh/100${d}`,amountLabel:'kWh charged'};
  if(fuelType==='CNG')return{unit:'kg',pricePlaceholder:'1.20',fullLabel:'Full tank',consumption:`kg/100${d}`,amountLabel:'kg filled'};
  const u=volUnit||'L';const cons=u==='gal'?'MPG':`${u}/100${d}`;
  return{unit:u,pricePlaceholder:u==='gal'?'3.50':'1.459',fullLabel:'Full tank',consumption:cons,amountLabel:u==='gal'?'Gallons filled':'Liters filled'};
}

function getPeriodRange(period){
  const now=new Date();
  const fmt=d=>d.toISOString().slice(0,10);
  if(period==='month'){
    return{from:fmt(new Date(now.getFullYear(),now.getMonth(),1)),to:fmt(now)};
  }
  if(period==='lastmonth'){
    return{from:fmt(new Date(now.getFullYear(),now.getMonth()-1,1)),to:fmt(new Date(now.getFullYear(),now.getMonth(),0))};
  }
  if(period==='30days'){
    const d=new Date(now);d.setDate(d.getDate()-30);
    return{from:fmt(d),to:fmt(now)};
  }
  if(period==='year'){
    return{from:fmt(new Date(now.getFullYear(),0,1)),to:fmt(now)};
  }
  if(period==='lastyear'){
    return{from:fmt(new Date(now.getFullYear()-1,0,1)),to:fmt(new Date(now.getFullYear()-1,11,31))};
  }
  if(period==='custom'&&state.customFrom&&state.customTo){
    return{from:state.customFrom,to:state.customTo};
  }
  return null;
}

async function loadVehicleComparison(range){
  const el=document.getElementById('vehicle-comparison');
  if(!el)return;
  const results=[];
  const colors=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899'];
  for(const v of state.vehicles.filter(v=>v.showInStats!==false)){
    const qp=range?`?from=${range.from}&to=${range.to}`:'';
    const st=await api(`/vehicles/${v.id}/stats${qp}`);
    results.push({name:v.name,spent:st.totalSpent,fillups:st.totalFillups,color:v.color});
  }
  const maxSpent=Math.max(...results.map(r=>r.spent),1);
  el.innerHTML=`<div class="chart-section"><h3>Spending by Vehicle</h3>${results.map((r,i)=>`<div class="chart-row"><span class="chart-label">${r.name}</span><div class="chart-bar"><div class="chart-bar-fill" style="width:${(r.spent/maxSpent*100).toFixed(0)}%;background:${r.color||colors[i%colors.length]}"></div></div><span class="chart-val">${curr}${r.spent.toFixed(0)}</span></div>`).join('')}</div>`;
}

function navBar(active){
  return `<div class="nav">
    <button class="${active==='dashboard'?'active':''}" onclick="state.page='dashboard';render()">Dashboard</button>
    <button class="${active==='vehicles'?'active':''}" onclick="state.page='vehicles';render()">Vehicles</button>
    <button class="${active==='settings'?'active':''}" onclick="state.page='settings';render()">Settings</button>
    <button style="margin-left:auto" onclick="toggleTheme()">${theme==='dark'?'☀️':'🌙'}</button>
    <button onclick="logout()" style="background:none;border:none;cursor:pointer;font-size:.85rem;color:var(--muted)">Logout</button>
  </div>`;
}

async function render(pushState=true){
  const app=document.getElementById('app');
  if(pushState)history.pushState({page:state.page,vehicleId:state.vehicleId},'','/');

  if(state.page==='login'){
    app.innerHTML=`<h1 style="text-align:center;margin-top:2rem">🚗 Roadlog</h1><p style="text-align:center;color:var(--muted);margin-bottom:2rem">Vehicle expense tracker</p>
    <form class="card" onsubmit="doLogin(event)"><div id="err"></div>
    <div class="form-group"><label>Email</label><input type="email" id="a_email" required placeholder="you@example.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="a_pass" required placeholder="••••••"></div>
    <button class="btn btn-primary btn-block" type="submit">Log In</button></form>
    <p style="text-align:center;margin-top:1rem"><button class="link" onclick="state.page='register';render()">No account? Register</button></p>`;
  } else if(state.page==='register'){
    app.innerHTML=`<h1 style="text-align:center;margin-top:2rem">🚗 Roadlog</h1><p style="text-align:center;color:var(--muted);margin-bottom:2rem">Create your account</p>
    <form class="card" onsubmit="doRegister(event)"><div id="err"></div>
    <div class="form-group"><label>Name</label><input id="r_name" required placeholder="Your name"></div>
    <div class="form-group"><label>Email</label><input type="email" id="r_email" required placeholder="you@example.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="r_pass" required minlength="4" placeholder="Min 4 characters"></div>
    <button class="btn btn-primary btn-block" type="submit">Register</button></form>
    <p style="text-align:center;margin-top:1rem"><button class="link" onclick="state.page='login';render()">Already have an account? Log in</button></p>`;

  } else if(state.page==='dashboard'){
    if(!state.period)state.period='year';
    if(!state.customFrom)state.customFrom='';
    if(!state.customTo)state.customTo='';
    const range=getPeriodRange(state.period);
    const qp=range?`?from=${range.from}&to=${range.to}`:'';
    try{state.dashboard=await api('/dashboard'+qp);state.dashAll=await api('/dashboard');const st=await api('/settings');curr=currencies[st.currency]||st.currency;volUnit=st.volumeUnit||'L';distUnit=st.distanceUnit||'km';state.vehicles=await api('/vehicles')}catch(e){return}
    const d=state.dashboard;d.monthly=d.monthly||[];const allTime=state.dashAll;
    const maxSpent=Math.max(...d.monthly.map(m=>m.totalSpent),1);
    app.innerHTML=`${navBar('dashboard')}<div class="header"><h1>Dashboard</h1><select class="period-select" onchange="state.period=this.value;render()"><option value="month" ${state.period==='month'?'selected':''}>This Month</option><option value="lastmonth" ${state.period==='lastmonth'?'selected':''}>Last Month</option><option value="30days" ${state.period==='30days'?'selected':''}>Last 30 Days</option><option value="year" ${state.period==='year'?'selected':''}>This Year</option><option value="lastyear" ${state.period==='lastyear'?'selected':''}>Last Year</option><option value="all" ${state.period==='all'?'selected':''}>All Time</option><option value="custom" ${state.period==='custom'?'selected':''}>Custom...</option></select></div>
    ${state.period==='custom'?`<div style="display:flex;gap:.5rem;margin-bottom:1rem"><input type="date" value="${state.customFrom}" onchange="state.customFrom=this.value;render()" style="flex:1;padding:.4rem;border:1px solid var(--border);border-radius:.4rem;background:var(--bg);color:var(--text)"><input type="date" value="${state.customTo}" onchange="state.customTo=this.value;render()" style="flex:1;padding:.4rem;border:1px solid var(--border);border-radius:.4rem;background:var(--bg);color:var(--text)"></div>`:''}
    <div style="margin-bottom:1rem;display:flex;gap:.5rem"><button class="btn btn-primary" onclick="quickAddExpense()">+ Fill-up</button><button class="btn" style="background:#10b981" onclick="quickAddOtherExpense()">+ Expense</button></div>
    <div id="due-soon-section"></div>
    <div class="stats">
      <div class="stat-card"><div class="value">${d.totalVehicles}</div><div class="label">Vehicles</div></div>
      <div class="stat-card"><div class="value">${d.totalFillups}</div><div class="label">Fill-ups</div></div>
      <div class="stat-card"><div class="value">${curr}${d.fuelSpent.toFixed(0)}</div><div class="label">Fuel</div></div>
      <div class="stat-card"><div class="value">${curr}${d.expenseSpent.toFixed(0)}</div><div class="label">Expenses</div></div>
      <div class="stat-card"><div class="value">${d.totalDistance?d.totalDistance.toFixed(0):'—'}</div><div class="label">${distUnit} driven</div></div>
      <div class="stat-card"><div class="value">${curr}${d.totalSpent.toFixed(2)}</div><div class="label">Within Period</div></div>
      <div class="stat-card"><div class="value">${curr}${allTime.totalSpent.toFixed(2)}</div><div class="label">Total</div></div>
    </div>
    <div class="chart-section"><h3>Monthly Spending</h3>
    ${d.monthly.length?(()=>{
      // Generate full month range for display
      let months;
      if(state.period==='year'){
        // Show all months Jan-current
        const now=new Date();months=[];
        for(let m=0;m<=now.getMonth();m++){const key=now.getFullYear()+'-'+String(m+1).padStart(2,'0');months.push(d.monthly.find(x=>x.month===key)||{month:key,totalSpent:0,fillups:0})}
      } else if(state.period==='all'||state.period==='custom'){
        // Last 6 months max
        months=[...d.monthly].reverse();if(months.length>6)months=months.slice(months.length-6);
      } else {
        months=[...d.monthly].reverse();
      }
      const maxSpent=Math.max(...months.map(m=>m.totalSpent),1);
      const pv=d.perVehicle||[];
      const colors=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899'];
      const legend=pv.map((v,i)=>{const c=v.color||colors[i%colors.length];const fuel=(v.monthly||[]).reduce((s,m)=>s+(m.fuelSpent||0),0);const exp=(v.monthly||[]).reduce((s,m)=>s+(m.expenseSpent||0),0);return '<div style="display:inline-flex;align-items:center;gap:.3rem;margin-right:.75rem;padding:.3rem .6rem;background:var(--surface);border:1px solid var(--border);border-radius:.4rem"><span style="width:10px;height:10px;border-radius:2px;background:'+c+'"></span><strong style="font-size:.8rem">'+v.vehicleName+'</strong> <span style="color:var(--muted);font-size:.7rem">⛽'+curr+fuel.toFixed(0)+' · 🧾'+curr+exp.toFixed(0)+'</span></div>'}).join('');
      let bars='';
      months.forEach(m=>{
        const total=m.totalSpent;
        let group='<div style="flex:1;min-width:30px;display:flex;flex-direction:column;align-items:center;gap:0">';
        group+='<div style="font-size:.65rem;color:var(--muted);margin-bottom:2px">'+curr+total.toFixed(0)+'</div>';
        group+='<div style="display:flex;flex-direction:column;justify-content:flex-end;width:100%;height:120px">';
        pv.forEach((v,i)=>{
          const c=v.color||colors[i%colors.length];
          const vm=(v.monthly||[]).find(x=>x.month===m.month);
          const fuel=vm?(vm.fuelSpent||0):0;
          const exp=vm?(vm.expenseSpent||0):0;
          const hFuel=maxSpent>0?(fuel/maxSpent*100).toFixed(0):0;
          const hExp=maxSpent>0?(exp/maxSpent*100).toFixed(0):0;
          group+='<div class="bar-tip" style="width:100%;height:'+hFuel+'%;background:'+c+';min-height:'+(fuel>0?'2px':'0')+'" data-tip="'+v.vehicleName+' fuel: '+curr+fuel.toFixed(0)+'"></div>';
          group+='<div class="bar-tip" style="width:100%;height:'+hExp+'%;background:'+c+';opacity:0.4;min-height:'+(exp>0?'2px':'0')+'" data-tip="'+v.vehicleName+' expenses: '+curr+exp.toFixed(0)+'"></div>';
        });
        group+='</div></div>';
        bars+=group;
      });
      const labels=months.map(m=>'<span>'+m.month.slice(5)+'/'+m.month.slice(0,4)+'</span>').join('');
      return '<div style="font-size:.75rem;margin-bottom:.5rem">'+legend+'</div><div style="display:flex;align-items:flex-end;gap:4px;padding:0 .25rem">'+bars+'</div><div class="vbar-labels">'+labels+'</div><div style="text-align:right;font-size:.8rem;color:var(--muted);margin-top:.5rem">Period total: '+curr+d.totalSpent.toFixed(2)+'</div>';
    })():'<p class="empty">No data for this period.</p>'}
    </div>
    <div id="vehicle-comparison" style="padding-bottom:5rem"></div>
    <div class="fab-container" id="fab"><button class="fab" onclick="document.getElementById('fab').classList.toggle('open')">+</button><div class="fab-menu"><button class="fab-item" style="background:var(--accent)" onclick="quickAddExpense()">⛽ Fill-up</button><button class="fab-item" style="background:#10b981" onclick="quickAddOtherExpense()">🧾 Expense</button></div></div>`;
    if(state.vehicles.length>1)loadVehicleComparison(range);
    loadDueSoon();

async function toggleSetting(key){
  state.settings[key]=!state.settings[key];
  await api('/settings',{method:'PUT',body:JSON.stringify(state.settings)});
  render();
}
async function changeCurrency(val){
  state.settings.currency=val;curr=currencies[val]||val;
  await api('/settings',{method:'PUT',body:JSON.stringify(state.settings)});
  render();
}
async function changeVolumeUnit(val){
  state.settings.volumeUnit=val;
  await api('/settings',{method:'PUT',body:JSON.stringify(state.settings)});
  render();
}
async function changeDistanceUnit(val){
  state.settings.distanceUnit=val;distUnit=val;
  await api('/settings',{method:'PUT',body:JSON.stringify(state.settings)});
  render();
}
async function changeTZ(val){
  state.settings.timezone=val;

}
async function renameStation(id){
  const st=state.allStations.find(s=>s.id===id);
  const name=prompt('Rename station:',st?st.name:'');
  if(name&&name!==st.name){
    await api(`/stations/${id}`,{method:'DELETE'});
    await api('/stations',{method:'POST',body:JSON.stringify({name:name,fuelType:st.fuelType})});
    render();
  }
}
async function delStation(id){
  await api(`/stations/${id}`,{method:'DELETE'});
  render();
}
async function addStationFromSettings(){
  const name=document.getElementById('new_st_name').value.trim();
  const fuelType=document.getElementById('new_st_fuel').value;
  if(!name)return;
  await api('/stations',{method:'POST',body:JSON.stringify({name,fuelType})});
  render();
}

function parseNum(id){return +(document.getElementById(id).value.replace(',','.'))||0}
function calcTotal(){
  const el=document.getElementById('f_total');
  if(el.dataset.manual)return;
  const fuel=parseNum('f_fuel'),price=parseNum('f_price');
  el.value=fuel&&price?(fuel*price).toFixed(2):'';
}

let stationsList=[];
let stationsLoaded=false;
async function showStations(){
  const v=await api(`/vehicles/${state.vehicleId}`);
  stationsList=await api(`/stations?fuelType=${v.fuelType}`)||[];
  stationsLoaded=true;
  renderStationDropdown(true);
}
function filterStations(){
  if(!stationsLoaded)return;
  renderStationDropdown(false);
}
function renderStationDropdown(showAll){
  const dd=document.getElementById('station-dropdown');
  const val=document.getElementById('f_station').value.toLowerCase().trim();
  const filtered=showAll?stationsList:stationsList.filter(s=>s.name.toLowerCase().includes(val));
  dd.style.display='block';
  let html=filtered.map(s=>`<div class="dropdown-item" onmousedown="pickStation('${s.name.replace(/'/g,"\\'")}')" ><span>${s.name}</span><button class="del-btn" onmousedown="event.stopPropagation();removeStation(${s.id})">✕</button></div>`).join('');
  if(val&&!stationsList.find(s=>s.name.toLowerCase()===val)){
    html+=`<div class="dropdown-add" onmousedown="saveAndPickStation()">+ Save "${document.getElementById('f_station').value}"</div>`;
  }
  if(!html){dd.style.display='none';return}
  dd.innerHTML=html;
}
function pickStation(name){
  document.getElementById('f_station').value=name;
  document.getElementById('station-dropdown').style.display='none';
}
async function saveAndPickStation(){
  const name=document.getElementById('f_station').value;
  const v=await api(`/vehicles/${state.vehicleId}`);
  const saved=await api('/stations',{method:'POST',body:JSON.stringify({name:name,fuelType:v.fuelType})});
  stationsList.push(saved);
  document.getElementById('station-dropdown').style.display='none';
}
async function removeStation(id){
  await api(`/stations/${id}`,{method:'DELETE'});
  stationsList=stationsList.filter(s=>s.id!==id);

function goExpense(){state.page='addExpense';state.exRecurring=false;state.exPaid=true;state.exForm=null;render()}
function saveExForm(){state.exForm={date:document.getElementById('ex_date')?.value,amount:document.getElementById('ex_amount')?.value,cat:document.getElementById('ex_cat')?.value,notes:document.getElementById('ex_notes')?.value,interval:document.getElementById('ex_interval')?.value,due:document.getElementById('ex_due')?.value,notify:document.getElementById('ex_notify')?.value}}
async function submitExpense(e){
  e.preventDefault();
  const data={date:new Date(document.getElementById('ex_date').value).toISOString(),amount:+document.getElementById('ex_amount').value,category:document.getElementById('ex_cat').value,notes:document.getElementById('ex_notes').value};
  if(state.exRecurring){
    const interval=document.getElementById('ex_interval').value;
    data.recurring=true;data.interval=interval;data.notifyDaysBefore=+document.getElementById('ex_notify').value||7;
    if(state.exPaid===false){
      // Future: just a template, next due from picker
      data.nextDue=new Date(document.getElementById('ex_due').value).toISOString();data.date=data.nextDue;
    } else {
      // Already paid: next due = expense date + interval
      const d=new Date(document.getElementById('ex_date').value);
      if(interval==='monthly')d.setMonth(d.getMonth()+1);
      else if(interval==='quarterly')d.setMonth(d.getMonth()+3);
      else d.setFullYear(d.getFullYear()+1);
      data.nextDue=d.toISOString();
    }
  }
  await api(`/vehicles/${state.vehicleId}/expenses`,{method:'POST',body:JSON.stringify(data)});
  openVehicle(state.vehicleId);
}
function editExpense(id,vehicleId){
  state.vehicleId=vehicleId;

  api(`/vehicles/${vehicleId}/expenses`).then(exps=>{state.editingExpense=exps.find(e=>e.id===id);state.page='editExpense';render()});
}

  if(ex.recurring){data.interval=document.getElementById('eex_interval').value;const due=document.getElementById('eex_due').value;if(due)data.nextDue=new Date(due).toISOString();data.notifyDaysBefore=+document.getElementById('eex_notify').value||7}
  await api(`/expenses/${ex.id}`,{method:'PUT',body:JSON.stringify(data)});
  openVehicle(state.vehicleId);
}

function paginator(pg,pages,key){
  const btn=(n,label,active)=>`<button class="btn btn-sm" style="background:${active?'var(--accent)':'var(--border)'};min-width:32px" onclick="state.${key}=${n};render()">${label||n}</button>`;
  let btns=[];
  btns.push(btn(Math.max(1,pg-1),'←'));
  btns.push(btn(1,1,pg===1));
  if(pg>3)btns.push('<span style="padding:0 .3rem;color:var(--muted)">…</span>');
  for(let i=Math.max(2,pg-1);i<=Math.min(pages-1,pg+1);i++)btns.push(btn(i,i,pg===i));
  if(pg<pages-2)btns.push('<span style="padding:0 .3rem;color:var(--muted)">…</span>');
  if(pages>1)btns.push(btn(pages,pages,pg===pages));
  btns.push(btn(Math.min(pages,pg+1),'→'));
  return '<div style="display:flex;justify-content:center;align-items:center;gap:.25rem;margin-top:.75rem">'+btns.join('')+'</div>';
}
function toggleBulkSelect(type){
  state.bulkMode=state.bulkMode===type?null:type;

async function uploadCSV(){
  const file=document.getElementById('csv_file').files[0];
  if(!file)return;
  const text=await file.text();
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const parse=line=>{const r=[];let cur='',inQ=false;for(const ch of line){if(ch==='"'){inQ=!inQ}else if((ch===','||ch===';')&&!inQ){r.push(cur.trim());cur=''}else{cur+=ch}}r.push(cur.trim());return r};
  const headers=parse(lines[0]);
  const data=lines.slice(1).map(parse).filter(r=>r.length>=headers.length-1);
  state.csvHeaders=headers;
  state.csvPreview=data.slice(0,5);
  state.csvData=data;
  state.csvGuess=guessMapping(headers,data.slice(0,5));
  render();
}
function guessMapping(headers,preview){
  const guess={};
  const lh=headers.map(h=>h.toLowerCase());
  const patterns={date:/date|datum|time|when/i,odometer:/odo|km|mileage|kilo|mile|distance/i,fuelAmount:/fuel|amount|quantity|liter|litre|volume|kwh|gallon/i,pricePerUnit:/price.*unit|unit.*price|price.*l|€.*l|cost.*l/i,totalCost:/total|cost|paid|amount.*€|sum|price$/i,station:/station|place|location|gas|pump|where/i,notes:/note|comment|memo|remark/i,fullTank:/full|tank|complete/i,amount:/amount|cost|total|price|sum|paid/i,category:/category|type|kind|group/i};
  Object.entries(patterns).forEach(([field,re])=>{
    const idx=lh.findIndex(h=>re.test(h));
    if(idx>=0&&!Object.values(guess).includes(idx))guess[field]=idx;
  });
  // If totalCost and pricePerUnit both match same pattern, disambiguate by values
  if(!guess.pricePerUnit&&!guess.totalCost){
    lh.forEach((h,i)=>{
      if(/price|cost/i.test(h)&&!(i in Object.values(guess))){
        const vals=preview.map(r=>parseFloat((r[i]||'').replace(/[^0-9.,]/g,'').replace(',','.')));
        const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
        if(avg<10)guess.pricePerUnit=i;else guess.totalCost=i;
      }
    });
  }
  return guess;
}
function getMappingValue(field){
  const el=document.getElementById('map_'+field);
  return el?+el.value:-1;
}
function renderMappedPreview(){
  const fields=['date','odometer','fuelAmount','pricePerUnit','totalCost','station'];
  const mapping={};
  fields.forEach(f=>{const v=getMappingValue(f);if(v>=0)mapping[f]=v});
  const el=document.getElementById('import-preview');
  if(!el||!state.csvPreview)return;
  const rows=state.csvPreview.map(row=>{
    return '<tr>'+fields.map(f=>{
      const idx=mapping[f];
      return '<td style="padding:.3rem .5rem;border-bottom:1px solid var(--border);font-size:.8rem">'+(idx>=0?(row[idx]||'—'):'—')+'</td>';
    }).join('')+'</tr>';
  }).join('');
  el.innerHTML='<table style="border-collapse:collapse;width:100%"><tr>'+fields.map(f=>'<th style="padding:.3rem .5rem;border-bottom:1px solid var(--border);text-align:left;color:var(--accent);font-size:.75rem">'+f+'</th>').join('')+'</tr>'+rows+'</table>';
}
async function doImport(){
  const mapping={};
  ['date','odometer','fuelAmount','pricePerUnit','totalCost','station','fullTank','notes'].forEach(f=>{
    const v=+document.getElementById('map_'+f).value;
    if(v>=0)mapping[f]=v;
  });
  if(!('date' in mapping)||!('fuelAmount' in mapping)){alert('Date and Fuel Amount are required');return}
  // Validate: check first 5 rows for zero values in numeric fields
  const numFields=[{key:'odometer',label:'Odometer'},{key:'fuelAmount',label:'Fuel Amount'}];
  const warnings=[];
  numFields.forEach(f=>{
    if(!(f.key in mapping))return;
    const col=mapping[f.key];
    const zeros=state.csvData.slice(0,5).filter(row=>{
      const v=row[col]?row[col].replace(/[^0-9.,]/g,''):'';
      return !v||parseFloat(v.replace(',','.'))==0;
    }).length;
    if(zeros>=3)warnings.push(f.label+' column looks unparseable ('+zeros+'/5 rows are zero). Values look like: "'+state.csvData[0][col]+'". Units like "km", "Lt" are stripped automatically, but check if the mapping is correct.');
  });
  if(warnings.length&&!confirm('⚠️ Warning:\\n\\n'+warnings.join('\\n\\n')+'\\n\\nImport anyway?'))return;
  const dateFormat=document.getElementById('map_dateformat').value;
  const clearFirst=document.getElementById('import_clear').checked;
  if(clearFirst&&!confirm('This will DELETE all existing fill-ups for this vehicle before importing. Continue?'))return;
  const res=await api('/import',{method:'POST',body:JSON.stringify({vehicleId:state.vehicleId,mapping,dateFormat,clearFirst,data:state.csvData})});
  alert(`Imported ${res.imported} fill-ups`+(res.errors&&res.errors.length?`\n${res.errors.length} errors`:''));
  state.csvHeaders=null;state.csvData=null;
  openVehicle(state.vehicleId);
}
function renderExpensePreview(){
  const fields=['date','amount','category','notes'];
  const mapping={};
  fields.forEach(f=>{const el=document.getElementById('map_'+f);if(el&&+el.value>=0)mapping[f]=+el.value});
  const el=document.getElementById('import-preview');
  if(!el||!state.csvPreview)return;
  const rows=state.csvPreview.map(row=>'<tr>'+fields.map(f=>{const idx=mapping[f];return '<td style="padding:.3rem .5rem;border-bottom:1px solid var(--border);font-size:.8rem">'+(idx>=0?(row[idx]||'—'):'—')+'</td>'}).join('')+'</tr>').join('');
  el.innerHTML='<table style="border-collapse:collapse;width:100%"><tr>'+fields.map(f=>'<th style="padding:.3rem .5rem;border-bottom:1px solid var(--border);text-align:left;color:var(--accent);font-size:.75rem">'+f+'</th>').join('')+'</tr>'+rows+'</table>';
}
async function doImportExpenses(){
  const mapping={};
  ['date','amount','category','notes'].forEach(f=>{const v=+document.getElementById('map_'+f).value;if(v>=0)mapping[f]=v});
  if(!('date' in mapping)||!('amount' in mapping)){alert('Date and Amount are required');return}
  const dateFormat=document.getElementById('map_dateformat').value;
  const clearFirst=document.getElementById('import_clear').checked;
  if(clearFirst&&!confirm('This will DELETE all existing expenses for this vehicle before importing. Continue?'))return;

  alert(`Imported ${res.imported} expenses`+(res.errors&&res.errors.length?`\n${res.errors.length} errors`:''));
  state.csvHeaders=null;state.csvData=null;

}
async function doRestore(input){
  const file=input.files[0];if(!file)return;
  if(!confirm('This will replace ALL data. Are you sure?'))return;
  const text=await file.text();
  try{
    const res=await api('/restore',{method:'POST',body:text});
    alert(`Restored: ${res.vehicles} vehicles, ${res.fillups} fill-ups, ${res.expenses||0} expenses`);
    render();
  }catch(err){alert('Restore failed: '+err.message)}
}

async function loadRemindersSection(){
  const el=document.getElementById('reminders-section');if(!el)return;
  let items;try{items=await api(`/vehicles/${state.vehicleId}/reminders`)}catch(e){return}
  const upcoming=items.filter(r=>!r.done);
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem"><h2>Reminders</h2><button class="btn btn-sm btn-primary" onclick="showAddReminder()">+ Reminder</button></div>
  <div id="reminder-form"></div>
  ${upcoming.length?upcoming.map(r=>`<div class="card" style="cursor:default"><div style="display:flex;justify-content:space-between;align-items:center"><div><strong>${r.title}</strong><div style="font-size:.85rem;color:var(--muted)">${r.dueDate?'Due: '+new Date(r.dueDate).toLocaleDateString():''}${r.dueOdometer?' · At '+r.dueOdometer.toFixed(0)+' '+distUnit:''}${r.repeatMonths?' · ↻'+r.repeatMonths+'mo':''}${r.repeatKm?' · ↻'+r.repeatKm+distUnit:''}</div>${r.notes?'<div style="font-size:.8rem;color:var(--muted)">'+r.notes+'</div>':''}</div><div style="display:flex;gap:.25rem"><button class="btn btn-sm" style="background:#10b981" onclick="markReminderDone(${r.id})">✓</button><button class="btn btn-sm" style="background:#ef4444" onclick="deleteReminder(${r.id})">✕</button></div></div></div>`).join(''):'<p class="empty">No upcoming reminders.</p>'}`;
}

function showAddReminder(){
  document.getElementById('reminder-form').innerHTML=`<form class="card" style="cursor:default" onsubmit="submitReminder(event)">
  <div class="form-group"><label>Title</label><input id="rem_title" required placeholder="e.g. Oil change"></div>
  <div class="form-group"><label>Due Date</label><input type="date" id="rem_date"></div>
  <div class="form-group"><label>Due Odometer (${distUnit})</label><input type="number" id="rem_odo" placeholder="Optional"></div>
  <div class="form-group"><label>Repeat every (months)</label><input type="number" id="rem_rmonths" placeholder="0"></div>
  <div class="form-group"><label>Repeat every (${distUnit})</label><input type="number" id="rem_rkm" placeholder="0"></div>
  <div class="form-group"><label>Notes</label><input id="rem_notes"></div>
  <button class="btn btn-primary btn-sm" type="submit">Save</button> <button type="button" class="btn btn-sm" style="background:var(--border)" onclick="document.getElementById('reminder-form').innerHTML=''">Cancel</button></form>`;
}

async function submitReminder(e){
  e.preventDefault();
  const data={title:document.getElementById('rem_title').value,notes:document.getElementById('rem_notes').value,repeatMonths:+document.getElementById('rem_rmonths').value||0,repeatKm:+document.getElementById('rem_rkm').value||0};
  const d=document.getElementById('rem_date').value;if(d)data.dueDate=new Date(d).toISOString();
  const o=+document.getElementById('rem_odo').value;if(o)data.dueOdometer=o;
  await api(`/vehicles/${state.vehicleId}/reminders`,{method:'POST',body:JSON.stringify(data)});
  loadRemindersSection();
}

async function markReminderDone(id){
  await api(`/reminders/${id}/done`,{method:'POST'});
  loadRemindersSection();
}

async function deleteReminder(id){
  if(confirm('Delete this reminder?')){await api(`/reminders/${id}`,{method:'DELETE'});loadRemindersSection()}
}

async function loadSettingsNotifications(){
  const el=document.getElementById('settings-notifications');if(!el)return;
  let items;try{items=await api('/notifications')}catch(e){return}
  let html=items.map(n=>{
    const cfg=JSON.parse(n.config||'{}');
    const info=n.type==='pushover'?'Token: '+cfg.token?.slice(0,6)+'… / User: '+cfg.user?.slice(0,6)+'…':'URL: '+cfg.url?.slice(0,30)+'…';
    return `<div class="setting-row"><div><strong>${n.type}</strong> <span style="font-size:.8rem;color:${n.enabled?'#10b981':'var(--muted)'}">${n.enabled?'✓ Enabled':'Disabled'}</span><div style="font-size:.75rem;color:var(--muted)">${info}</div></div><div style="display:flex;gap:.25rem"><button class="btn btn-sm" style="background:var(--border)" onclick="editNotifConfig(${n.id})">✏️</button><button class="btn btn-sm" style="background:#ef4444" onclick="deleteNotifConfig(${n.id})">✕</button></div></div>`;
  }).join('');
  html+=`<div style="margin-top:.5rem"><button class="btn btn-sm" style="background:var(--border)" onclick="showAddNotifConfig()">+ Add</button></div><div id="notif-form"></div>`;
  el.innerHTML=html;
}

function showAddNotifConfig(existing){
  const n=existing||{type:'pushover',config:'{}'};
  const cfg=JSON.parse(n.config||'{}');
  document.getElementById('notif-form').innerHTML=`<form onsubmit="${n.id?'submitEditNotif(event,'+n.id+')':'submitNotifConfig(event)'}" style="margin-top:.5rem">
  <div class="form-group"><label>Type</label><select id="nc_type" onchange="toggleNotifFields()"><option value="pushover" ${n.type==='pushover'?'selected':''}>Pushover</option><option value="webhook" ${n.type==='webhook'?'selected':''}>Webhook</option></select></div>
  <div id="nc_fields">${n.type==='webhook'?'<div class="form-group"><label>Webhook URL</label><input id="nc_url" value="'+(cfg.url||'')+'" placeholder="https://..."></div>':'<div class="form-group"><label>App Token</label><input id="nc_token" value="'+(cfg.token||'')+'" placeholder="Pushover app token"></div><div class="form-group"><label>User Key</label><input id="nc_user" value="'+(cfg.user||'')+'" placeholder="Pushover user key"></div>'}</div>
  <div style="display:flex;gap:.5rem"><button class="btn btn-sm btn-primary" type="submit">Save</button><button type="button" class="btn btn-sm" style="background:var(--border)" onclick="testNotification()">🔔 Test</button></div></form>`;
}

async function editNotifConfig(id){
  const items=await api('/notifications');
  const n=items.find(x=>x.id===id);if(!n)return;
  showAddNotifConfig(n);
}

function toggleNotifFields(){
  const t=document.getElementById('nc_type').value;
  document.getElementById('nc_fields').innerHTML=t==='pushover'?
    '<div class="form-group"><label>App Token</label><input id="nc_token" placeholder="Pushover app token"></div><div class="form-group"><label>User Key</label><input id="nc_user" placeholder="Pushover user key"></div>':
    '<div class="form-group"><label>Webhook URL</label><input id="nc_url" placeholder="https://..."></div>';
}

async function submitNotifConfig(e){
  e.preventDefault();
  const type=document.getElementById('nc_type').value;
  let config;
  if(type==='pushover')config=JSON.stringify({token:document.getElementById('nc_token').value,user:document.getElementById('nc_user').value});
  else config=JSON.stringify({url:document.getElementById('nc_url').value});
  await api('/notifications',{method:'POST',body:JSON.stringify({type,enabled:true,config})});
  loadSettingsNotifications();
}

async function submitEditNotif(e,id){
  e.preventDefault();
  const type=document.getElementById('nc_type').value;
  let config;
  if(type==='pushover')config=JSON.stringify({token:document.getElementById('nc_token').value,user:document.getElementById('nc_user').value});
  else config=JSON.stringify({url:document.getElementById('nc_url').value});
  await api(`/notifications/${id}`,{method:'PUT',body:JSON.stringify({type,enabled:true,config})});
  loadSettingsNotifications();
}

async function deleteNotifConfig(id){
  await api(`/notifications/${id}`,{method:'DELETE'});loadSettingsNotifications();
}

async function testNotification(){
  const type=document.getElementById('nc_type').value;
  let config;
  if(type==='pushover')config=JSON.stringify({token:document.getElementById('nc_token').value,user:document.getElementById('nc_user').value});
  else config=JSON.stringify({url:document.getElementById('nc_url').value});
  try{await api('/notifications/test',{method:'POST',body:JSON.stringify({type,config})});alert('Test sent!')}catch(err){alert('Failed: '+err.message)}
}

async function loadAuditLog(offset=0){
  const el=document.getElementById('settings-audit');if(!el)return;
  let data;try{data=await api(`/audit?limit=20&offset=${offset}`)}catch(e){return}
  const entries=data.entries||[];
  let html=entries.map(e=>`<div style="padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.85rem"><span style="color:var(--accent)">${e.action}</span> ${e.entityType} <span style="color:var(--muted)">${e.details||''}</span>${e.vehicleName?' · <strong>'+e.vehicleName+'</strong>':''}<div style="font-size:.75rem;color:var(--muted)">${e.userName||'unknown'} · ${new Date(e.createdAt).toLocaleString()} · ${e.ip}</div></div>`).join('');
  if(!entries.length)html='<p class="empty">No activity yet.</p>';
  const total=data.total||0;
  if(total>20){
    html+=`<div style="display:flex;justify-content:center;gap:.5rem;margin-top:.75rem">`;
    if(offset>0)html+=`<button class="btn btn-sm" style="background:var(--border)" onclick="loadAuditLog(${offset-20})">← Prev</button>`;
    if(offset+20<total)html+=`<button class="btn btn-sm" style="background:var(--border)" onclick="loadAuditLog(${offset+20})">Next →</button>`;
    html+=`</div>`;
  }
  el.innerHTML=html;
}

window.addEventListener('popstate',e=>{
  if(e.state){state.page=e.state.page;state.vehicleId=e.state.vehicleId;render(false)}
});
render().catch(e=>{document.getElementById('app').innerHTML='<pre style="color:red;padding:1rem">Error: '+e.message+'\n'+e.stack+'</pre>'});
</script>
